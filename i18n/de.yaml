agent:
  name: Schulessen-Assistent
  description: Schulessen-Agent fuer Selu mit Live-Zugriff auf Speiseplan und Bestellungen ueber schulessen.net.
  long_description: Dieser Agent kann den Speiseplan ansehen, aktuelle Bestellungen zeigen, Essen bestellen und Essen abbestellen.

capabilities:
  schulessen:
    tools:
      get_menu:
        display_name: Speiseplan abrufen
        description: Rufe den aktuellen Speiseplan fuer einen oder mehrere Tage ab.
      get_cart:
        display_name: Bestellungen abrufen
        description: Zeige den aktuellen Warenkorb oder Bestellueberblick von schulessen.net.
      place_order:
        display_name: Essen bestellen
        description: Bestelle ein Essen fuer einen bestimmten Tag und ein bestimmtes Menue.
      cancel_order:
        display_name: Essen abbestellen
        description: Bestelle ein Essen ab oder entferne es aus dem Warenkorb.

approval:
  tools:
    schulessen__get_menu:
      label: Speiseplan abrufen
      message: Ich moechte den aktuellen Speiseplan fuer dich abrufen.
    schulessen__get_cart:
      label: Bestellungen abrufen
      message: Ich moechte die aktuellen Schulessen-Bestellungen fuer dich abrufen.
    schulessen__place_order:
      label: Essen bestellen
      message: Ich moechte dieses Essen fuer dich bestellen.
    schulessen__cancel_order:
      label: Essen abbestellen
      message: Ich moechte dieses Essen fuer dich abbestellen.
