name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "cap_image=${owner,,}/selu-cap-schulessen" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push capability image
        uses: docker/build-push-action@v6
        with:
          context: capabilities/schulessen/container
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:latest

      - name: Update manifest with GHCR image reference
        run: |
          sed -i "s|image: selu-cap-schulessen:latest|image: ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}|" \
            capabilities/schulessen/manifest.yaml

      - name: Create agent archive
        run: |
          tar czf agent.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='capabilities/*/container' \
            --exclude='README.md' \
            --exclude='tests' \
            agent.yaml \
            agent.md \
            agent.*.md \
            i18n/ \
            capabilities/

      - name: Compute SHA-256
        id: sha
        run: |
          sha=$(sha256sum agent.tar.gz | awk '{print $1}')
          echo "sha256=${sha}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: agent.tar.gz
          generate_release_notes: true
